<!DOCTYPE html>

<html>
  <head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-PN5V582G');</script>
    <!-- End Google Tag Manager -->
    <title>{{ dato[contenido[0][0]]['subcat'].capitalize() }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/subcat.css') }}">
  </head>
  <body>

    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PN5V582G"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->


    <header>
      <div class="bar-flex">
        <div class="bar-log">
          <a href="/"><h1>Verdana</h1></a>
        </div>
      </div>
    </header>
    
    <h1 class="rec">{{ dato[contenido[0][0]]['subcat'].capitalize() }}</h1>
    <div class="grande">
      <a href="/{{ dato[contenido[0][0]]['categoria'] }}/{{ dato[contenido[0][0]]['subcat'] }}/{{ dato[contenido[0][0]]['alink'] }}"><h1 class="tit">{{ dato[contenido[0][0]]['title'] }}</h1></a>
      <img class="img-grande" src="{{ dato[contenido[0][0]]['imagen'] }}" alt="">
    </div>
    {% for i in contenido %}
    {% if i[0] != contenido[0][0] %}
    <div class="bar-new">
      <div class="bar-new-img">
        <img src="{{ dato[i[0]]['imagen'] }}" alt="">
      </div>
      <div class="bar-new-text">
        <a href="/{{ dato[i[0]]['categoria'] }}/{{ dato[i[0]]['subcat'] }}/{{ dato[i[0]]['alink'] }}"><h3>{{ dato[i[0]]['title'] }}</h3></a>
      </div>
    </div>
    <br><br>
    {% endif %}
    {% endfor %}
  </body>
</html>
